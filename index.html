ront": "The sun is shining. / It's sunny.", "back": {"primary": "Solen skiner. / Det är soligt.", "note": "skina = Group 4 verb (sken, skinit). solig = sunny (adj).", "example": "Solen skiner och det är varmt ute.", "example_translation": "The sun is shining and it's warm outside."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-045", "type": "phrase", "subcategory": "weather", "emoji": "🌡️", "front": "It's warm.", "back": {"primary": "Det är varmt.", "note": "Weather = Det är + adjective. varm/varmt/varma.", "example": "Det är varmt idag — 25 grader!", "example_translation": "It's warm today — 25 degrees!"}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-046", "type": "phrase", "subcategory": "weather", "emoji": "🥶", "front": "It's cold.", "back": {"primary": "Det är kallt.", "note": "kall/kallt/kalla. Weather uses the ett-form (kallt) because 'det' is ett-word.", "example": "Det är kallt ute — minus tio grader.", "example_translation": "It's cold outside — minus ten degrees."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-047", "type": "phrase", "subcategory": "weather", "emoji": "🌬️", "front": "It's windy.", "back": {"primary": "Det blåser.", "note": "blåsa = Group 2b verb (blåste, blåst). Lexin verified. 'Det blåser' is the standard weather expression.", "example": "Det blåser kraftigt idag.", "example_translation": "It's very windy today."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-048", "type": "phrase", "subcategory": "weather", "emoji": "🌧️", "front": "It's raining.", "back": {"primary": "Det regnar.", "note": "regna = Group 1 verb (regnade, regnat). Lexin verified.", "example": "Det regnar varje dag den här veckan.", "example_translation": "It rains every day this week."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-049", "type": "phrase", "subcategory": "weather", "emoji": "❄️", "front": "It's snowing.", "back": {"primary": "Det snöar.", "note": "snöa = Group 1 verb (snöade, snöat). Lexin verified.", "example": "Det snöar i december och januari.", "example_translation": "It snows in December and January."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-050", "type": "phrase", "subcategory": "weather", "emoji": "⛈️", "front": "There's a thunderstorm.", "back": {"primary": "Det åskar.", "note": "åska = Group 1 verb (åskade, åskat). Lexin verified. Also noun: en åska = thunder(storm).", "example": "Det åskade och blixtrade hela natten.", "example_translation": "There was thunder and lightning all night."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-051", "type": "phrase", "subcategory": "weather", "emoji": "🌫️", "front": "It's foggy.", "back": {"primary": "Det är dimma. / Det är dimmigt.", "note": "en dimma = fog (noun). dimmig/dimmigt/dimmiga = foggy (adj).", "example": "Det var dimma hela morgonen.", "example_translation": "It was foggy all morning."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-052", "type": "phrase", "subcategory": "weather", "emoji": "☁️", "front": "It's cloudy.", "back": {"primary": "Det är mulet. / Det är molnigt.", "note": "mulet = overcast. molnigt = cloudy. Both used. ett moln = a cloud.", "example": "Det är mulet men det regnar inte.", "example_translation": "It's overcast but it's not raining."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-053", "type": "noun_en", "subcategory": "weather", "emoji": "☀️", "front": "a sun", "back": {"primary": "en sol", "forms": ["en sol", "solen", "solar", "solarna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 2 (-ar)", "note": "Lexin verified. Solen skiner = The sun is shining.", "example": "Solen går ner tidigt på vintern.", "example_translation": "The sun goes down early in winter."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-054", "type": "noun_en", "subcategory": "weather", "emoji": "🌫️", "front": "fog", "back": {"primary": "en dimma", "forms": ["en dimma", "dimman", "dimmor", "dimmorna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 1 (-or)", "note": "Lexin verified.", "example": "Det var tät dimma på motorvägen.", "example_translation": "There was thick fog on the motorway."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-055", "type": "noun_ett", "subcategory": "weather", "emoji": "☁️", "front": "a cloud", "back": {"primary": "ett moln", "forms": ["ett moln", "molnet", "moln", "molnen"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 6 (no ending)", "note": "Lexin verified. Plural same as singular! molnig/molnigt/molniga = cloudy.", "example": "Det finns inga moln på himlen idag.", "example_translation": "There are no clouds in the sky today."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-056", "type": "noun_ett", "subcategory": "weather", "emoji": "🌧️", "front": "rain", "back": {"primary": "ett regn", "forms": ["ett regn", "regnet", "regn", "regnen"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 6 (no ending)", "note": "Lexin verified. Usually uncountable — regnet (the rain).", "example": "Regnet har inte slutat på tre dagar.", "example_translation": "The rain hasn't stopped for three days."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-057", "type": "noun_en", "subcategory": "weather", "emoji": "❄️", "front": "snow", "back": {"primary": "en snö", "forms": ["en snö", "snön", "–", "–"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "no plural (uncountable)", "note": "Lexin verified. No plural form — always singular. snön = the snow.", "example": "Snön smälter i mars.", "example_translation": "The snow melts in March."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-058", "type": "noun_en", "subcategory": "weather", "emoji": "⛈️", "front": "thunder / thunderstorm", "back": {"primary": "en åska", "forms": ["en åska", "åskan", "–", "–"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "no plural", "note": "Lexin verified. No plural. Also a verb: det åskar = it thunders.", "example": "Det var åska igår kväll.", "example_translation": "There was a thunderstorm last night."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-059", "type": "noun_ett", "subcategory": "weather", "emoji": "🌤️", "front": "weather", "back": {"primary": "ett väder", "forms": ["ett väder", "vädret", "väder", "vädren"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 6 (no ending)", "note": "Lexin verified. Hur är vädret? = How's the weather?", "example": "Vädret är fint idag.", "example_translation": "The weather is nice today."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-060", "type": "noun_en", "subcategory": "weather", "emoji": "🌡️", "front": "a degree", "back": {"primary": "en grad", "forms": ["en grad", "graden", "grader", "graderna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 3 (-er)", "note": "Lexin verified. Det är tjugofem grader = It's 25 degrees. minus tio grader = minus ten degrees.", "example": "Det är trettio grader ute.", "example_translation": "It's thirty degrees outside."}, "source": "TB p.96–97", "rating": 0, "group": "chapter"}, {"id": "ch8-061", "type": "noun_en", "subcategory": "time", "emoji": "📅", "front": "a month", "back": {"primary": "en månad", "forms": ["en månad", "månaden", "månader", "månaderna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 3 (-er)", "note": "Lexin verified.", "example": "Vi har bott här i sex månader.", "example_translation": "We have lived here for six months."}, "source": "TB p.94–95", "rating": 0, "group": "chapter"}, {"id": "ch8-062", "type": "phrase", "subcategory": "months", "emoji": "📅", "front": "List all 12 months in Swedish.", "back": {"primary": "januari, februari, mars, april, maj, juni, juli, augusti, september, oktober, november, december", "table": {"1": "januari", "2": "februari", "3": "mars", "4": "april", "5": "maj", "6": "juni", "7": "juli", "8": "augusti", "9": "september", "10": "oktober", "11": "november", "12": "december"}, "note": "All lowercase in Swedish (unlike English). Months are en-words. i januari = in January. Wiktionary verified.", "example": "Min födelsedag är i maj.", "example_translation": "My birthday is in May."}, "source": "TB p.94–95", "rating": 0, "group": "chapter"}, {"id": "ch8-063", "type": "phrase", "subcategory": "ordinals", "emoji": "🔢", "front": "Ordinal numbers 1st–12th in Swedish", "back": {"primary": "första, andra, tredje, fjärde, femte, sjätte, sjunde, åttonde, nionde, tionde, elfte, tolfte", "table": {"1:a": "första", "2:a": "andra", "3:e": "tredje", "4:e": "fjärde", "5:e": "femte", "6:e": "sjätte", "7:e": "sjunde", "8:e": "åttonde", "9:e": "nionde", "10:e": "tionde", "11:e": "elfte", "12:e": "tolfte"}, "note": "1:a and 2:a end in -a. 3:e onwards end in -e. den första januari = January 1st. Written: 1:a, 2:a, 3:e, 4:e...", "example": "Jag kom till Sverige den tredje september.", "example_translation": "I came to Sweden on September 3rd."}, "source": "TB p.94–95", "rating": 0, "group": "chapter"}, {"id": "ch8-064", "type": "phrase", "subcategory": "ordinals", "emoji": "🔢", "front": "Ordinal numbers 13th–31st in Swedish — what's the pattern?", "back": {"primary": "trettonde, fjortonde ... trettionde, trettioförsta", "table": {"13:e": "trettonde", "14:e": "fjortonde", "15:e": "femtonde", "16:e": "sextonde", "17:e": "sjuttonde", "18:e": "artonde", "19:e": "nittonde", "20:e": "tjugonde", "21:a": "tjugoförsta", "22:a": "tjugoandra", "23:e": "tjugotredje", "30:e": "trettionde", "31:a": "trettioförsta"}, "note": "Pattern: cardinal + -de (trett-onde, fjort-onde). 21:a, 22:a end in -a (because första/andra). 23:e–29:e follow the 3–9 pattern.", "example": "Vi ses den tjugoförsta december.", "example_translation": "We'll meet on December 21st."}, "source": "TB p.94–95", "rating": 0, "group": "chapter"}, {"id": "ch8-065", "type": "grammar", "subcategory": "perfekt", "emoji": "📝", "front": "How do you form presens perfekt in Swedish? What's the formula?", "back": {"primary": "har + supinum", "table": {"Group 1": "har pratat (infinitiv -a → supinum -at)", "Group 2a": "har ringt (infinitiv -a → supinum -t)", "Group 2b": "har köpt (infinitiv -a → supinum -t)", "Group 3": "har bott (short vowel → supinum -tt)", "Group 4a": "har skrivit (strong verb → supinum -it)", "Group 4b": "har gått (irregular)"}, "rule_english": "Presens perfekt = har + supinum. Use for: experiences (Har du ridit?), unfinished time periods (Jag har bott här i tre år), results still relevant now.", "example": "Har du varit i Sverige förut?", "example_translation": "Have you been to Sweden before?"}, "source": "TB p.89 FOKUS", "rating": 0, "group": "other"}, {"id": "ch8-066", "type": "grammar", "subcategory": "perfekt_vs_preteritum", "emoji": "⚖️", "front": "When do you use presens perfekt vs. preteritum?", "back": {"primary": "Perfekt = no specific time / still relevant. Preteritum = specific time in the past.", "table": {"perfekt": "Jag har bott i Sverige. (still relevant, general experience)", "preteritum": "Jag bodde i Sverige 2019. (specific time, finished)"}, "rule_english": "Perfekt: general past experience, no specific time (Har du varit i Paris?). Preteritum: specific time stated or implied (Jag var i Paris i juni). Signal words — perfekt: aldrig, alltid, redan, ännu. Preteritum: igår, förra veckan, 2020, då.", "example": "Har du varit i Stockholm? — Ja, jag var där förra sommaren.", "example_translation": "Have you been to Stockholm? — Yes, I was there last summer."}, "source": "TB p.91 FOKUS", "rating": 0, "group": "other"}, {"id": "ch8-067", "type": "grammar", "subcategory": "adverbs", "emoji": "🏠", "front": "What's the difference between hemma and hem?", "back": {"primary": "hemma = at home (position). hem = (to) home (direction).", "table": {"position (var?)": "hemma — Jag är hemma.", "direction (vart?)": "hem — Jag går hem."}, "rule_english": "Position (where something IS) = hemma. Direction (where something is GOING) = hem. Same pattern applies to other pairs.", "example": "Jag är hemma nu. / Jag går hem nu.", "example_translation": "I am at home now. / I'm going home now."}, "source": "TB p.94 FOKUS, ÖB p.105", "rating": 0, "group": "other"}, {"id": "ch8-068", "type": "grammar", "subcategory": "adverbs", "emoji": "📍", "front": "List the Swedish adverb pairs: position (var?) vs. direction (vart?)", "back": {"primary": "hemma/hem, inne/in, ute/ut, uppe/upp, nere/ner, borta/bort", "table": {"hemma → hem": "at home → (to) home", "inne → in": "inside → (to) inside", "ute → ut": "outside → (to) outside", "uppe → upp": "up (there) → up (going)", "nere → ner/ned": "down (there) → down (going)", "borta → bort": "away (there) → away (going)"}, "rule_english": "Position = where you ARE (hemma, inne, ute). Direction = where you're GOING (hem, in, ut). Swedish always distinguishes these — English often doesn't.", "example": "Barnen är ute. / Barnen går ut.", "example_translation": "The children are outside. / The children go outside."}, "source": "TB p.94 FOKUS, ÖB p.105", "rating": 0, "group": "other"}, {"id": "ch8-069", "type": "grammar", "subcategory": "modal_verbs", "emoji": "🔧", "front": "What are the 5 hjälpverb (modal verbs) from Chapter 8?", "back": {"primary": "får, hinner, orkar, behöver (inte), borde", "table": {"får": "to be allowed / may — Du får inte röka här.", "hinner": "to have time — Jag hinner inte äta.", "orkar": "to have energy — Hon orkar inte springa.", "behöver inte": "don't need to — Du behöver inte betala.", "borde": "should/ought — Du borde sova mer."}, "rule_english": "These are modal/auxiliary verbs — they come before the main verb (in infinitive). Pattern: modal + infinitive. Note: behöver is mostly used in negative (behöver inte).", "example": "Du borde ringa din mamma.", "example_translation": "You should call your mum."}, "source": "TB p.98 FOKUS", "rating": 0, "group": "other"}, {"id": "ch8-070", "type": "grammar", "subcategory": "weather", "emoji": "🌤️", "front": "How do you talk about weather in Swedish? What are the two patterns?", "back": {"primary": "Det + verb OR Det är + adjective", "table": {"Det + verb": "Det regnar. Det snöar. Det blåser. Det åskar.", "Det är + adj": "Det är soligt. Det är varmt. Det är kallt. Det är mulet."}, "rule_english": "Pattern 1: Det + weather verb (regnar, snöar, blåser, åskar). Pattern 2: Det är + weather adjective (soligt, varmt, kallt, mulet, molnigt, dimmigt). Special: Solen skiner = The sun shines.", "example": "Hur är vädret? — Det regnar och det är kallt.", "example_translation": "How's the weather? — It's raining and it's cold."}, "source": "TB p.96–97 FOKUS", "rating": 0, "group": "other"}, {"id": "ch8-071", "type": "phrase", "subcategory": "dates", "emoji": "📅", "front": "How do you say dates in Swedish? (e.g. 'September 3rd')", "back": {"primary": "den + ordinal + month", "note": "den tredje september = September 3rd. den första januari = January 1st. Written: den 3:e september or 3/9. i + month = in [month]: i september.", "example": "Jag är född den fjortonde februari.", "example_translation": "I was born on February 14th."}, "source": "TB p.94–95", "rating": 0, "group": "chapter"}, {"id": "ch8-072", "type": "phrase", "subcategory": "experiences", "emoji": "❓", "front": "Have you ever...? (asking about experiences)", "back": {"primary": "Har du (någonsin) ...?", "note": "Use presens perfekt for experience questions. någonsin = ever (optional but common). aldrig = never.", "example": "Har du någonsin vinterbad?\nHar du ridit?", "example_translation": "Have you ever gone ice swimming?\nHave you ridden (a horse)?"}, "source": "TB p.92", "rating": 0, "group": "chapter"}, {"id": "ch8-073", "type": "noun_en", "subcategory": "activities", "emoji": "🐴", "front": "a horse", "back": {"primary": "en häst", "forms": ["en häst", "hästen", "hästar", "hästarna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 2 (-ar)", "note": "Lexin verified. rida (en häst) = to ride (a horse).", "example": "Hästen springer fort.", "example_translation": "The horse runs fast."}, "source": "TB p.92", "rating": 0, "group": "chapter"}, {"id": "ch8-074", "type": "noun_en", "subcategory": "activities", "emoji": "⛵", "front": "a boat", "back": {"primary": "en båt", "forms": ["en båt", "båten", "båtar", "båtarna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 2 (-ar)", "note": "Lexin verified. segla (en båt) = to sail (a boat).", "example": "Vi har en liten båt vid sjön.", "example_translation": "We have a small boat by the lake."}, "source": "TB p.92", "rating": 0, "group": "chapter"}, {"id": "ch8-075", "type": "noun_ett", "subcategory": "activities", "emoji": "⛺", "front": "a tent", "back": {"primary": "ett tält", "forms": ["ett tält", "tältet", "tält", "tälten"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 6 (no ending)", "note": "Lexin verified. tälta = to camp/tent.", "example": "Vi sov i tältet vid stranden.", "example_translation": "We slept in the tent by the beach."}, "source": "TB p.92", "rating": 0, "group": "chapter"}, {"id": "ch8-076", "type": "noun_en", "subcategory": "activities", "emoji": "🎿", "front": "a ski", "back": {"primary": "en skida", "forms": ["en skida", "skidan", "skidor", "skidorna"], "forms_labels": ["indef. sg", "def. sg", "indef. pl", "def. pl"], "plural_group": "group 1 (-or)", "note": "Lexin verified. Usually plural: skidor. åka skidor = to ski.", "example": "Jag har köpt ny let currentChapter = 7;
let CARDS_RAW = CHAPTERS[currentChapter].cards;

function getStorageKey() { return `svenska_ch${currentChapter}_ratings_v3`; }

const TYPE_LABELS = {
  noun_en:   'en-word',
  noun_ett:  'ett-word',
  adjective: 'Adjective',
  verb:      'Verb',
  phrase:    'Phrase',
  grammar:   'Grammar',
};

const TYPE_COLORS = {
  noun_en:   '#2065B8',
  noun_ett:  '#1F8A4A',
  adjective: '#B8720A',
  verb:      '#C03018',
  phrase:    '#5E35B1',
  grammar:   '#007D82',
};

// Colors for form positions (0=type color, 1,2,3 fixed)
const FORM_POS_COLORS = [null, '#0A818A', '#7028C8', '#B56008'];

const DECO_LABELS = {
  noun_en: 'N·EN', noun_ett: 'N·ETT', adjective: 'ADJ',
  verb: 'VB', phrase: 'PH', grammar: 'GR'
};

// ── TTS ─────────────────────────────────────────────────────────────────────
function speak(text, btnEl) {
  if (!window.speechSynthesis) { alert('Speech not supported in this browser.'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'sv-SE';
  utter.rate = 0.88;
  if (btnEl) {
    btnEl.classList.add('speaking');
    utter.onend = () => btnEl.classList.remove('speaking');
    utter.onerror = () => btnEl.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utter);
}

const WEIGHT_MAP = { 0:4, 1:6, 2:5, 3:3, 4:2, 5:1 };

// ── STATE ───────────────────────────────────────────────────────────────────
let ratings      = {};
let deck         = [];
let pos          = 0;
let flipped      = false;
let activeGroup  = 'all';
let activeType   = 'all';

// ── DARK MODE ───────────────────────────────────────────────────────────────
const html = document.documentElement;
const DM_KEY = 'svenska_darkmode';
if (localStorage.getItem(DM_KEY) === 'dark') html.setAttribute('data-theme', 'dark');

document.getElementById('darkToggle').addEventListener('click', () => {
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem(DM_KEY, isDark ? 'light' : 'dark');
});

// ── RATINGS ─────────────────────────────────────────────────────────────────
function loadRatings() {
  try {
    ratings = {};
    const saved = localStorage.getItem(getStorageKey());
    if (saved) ratings = JSON.parse(saved);
  } catch(e) {}
}
function saveRatings() {
  localStorage.setItem(getStorageKey(), JSON.stringify(ratings));
}

// ── FILTERING ───────────────────────────────────────────────────────────────
function getPool() {
  return CARDS_RAW.filter(c => {
    const groupOk = activeGroup === 'all' || c.group === activeGroup;
    const typeOk  = activeType  === 'all' || c.type  === activeType;
    return groupOk && typeOk;
  });
}

function buildDeck() {
  deck = [];
  getPool().forEach(card => {
    const r = ratings[card.id] || 0;
    const w = WEIGHT_MAP[r] || 4;
    for (let i = 0; i < w; i++) deck.push(card);
  });
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  pos = 0;
}

function getMastery() {
  const pool = getPool();
  if (!pool.length) return 0;
  const total = pool.reduce((sum, c) => sum + (ratings[c.id] || 0), 0);
  return Math.round((total / (pool.length * 5)) * 100);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function updateHeader() {
  document.getElementById('masteryPct').textContent = getMastery() + '%';
  document.getElementById('progressLabel').textContent =
    deck.length ? `${pos + 1} / ${deck.length}` : '0 / 0';
  document.getElementById('progressBar').style.width =
    deck.length ? ((pos / deck.length) * 100) + '%' : '0%';
}

function showCard() {
  if (pos >= deck.length) {
    document.getElementById('cardWrap').style.display = 'none';
    document.getElementById('cardRating').classList.remove('visible');
    document.getElementById('celebration').classList.add('visible');
    return;
  }

  document.getElementById('celebration').classList.remove('visible');
  document.getElementById('cardWrap').style.display = 'block';

  const card  = deck[pos];
  const color = TYPE_COLORS[card.type] || '#888';
  const label = TYPE_LABELS[card.type] || card.type;

  // Reset to front
  flipped = false;
  document.getElementById('cardWrap').classList.remove('flipped');
  document.getElementById('cardRating').classList.remove('visible');

  // Accent bars
  document.getElementById('frontBar').style.background = color;
  document.getElementById('backBar').style.background  = color;

  // Front
  const fb = document.getElementById('frontBadge');
  fb.textContent = label;
  fb.style.background = color;
  document.getElementById('cardEmoji').textContent = card.emoji || '📖';
  document.getElementById('cardPrompt').textContent = card.front;

  // Back english header
  const beh = document.getElementById('backEnHeader');
  beh.textContent = card.front;
  beh.style.color = color;
  document.getElementById('cardEmojiBack').textContent = card.emoji || '';

  // Back primary word — in type color
  const bp = document.getElementById('backPrimary');
  bp.textContent = card.back.primary;
  bp.style.color = color;

  // Plural group tag
  const pg = document.getElementById('backPluralGroup');
  if (card.back.plural_group) {
    pg.textContent = card.back.plural_group;
    pg.style.display = 'block';
  } else {
    pg.style.display = 'none';
  }

  // Forms grid — first value colored, rest normal
  const formsEl = document.getElementById('backForms');
  formsEl.innerHTML = '';
  if (card.back.table) {
    const tbl = document.createElement('table');
    tbl.className = 'grammar-table';
    Object.entries(card.back.table).forEach(([k, v]) => {
      const tr = tbl.insertRow();
      tr.insertCell().textContent = k;
      tr.insertCell().textContent = v;
    });
    formsEl.appendChild(tbl);
  } else if (card.back.forms && card.back.forms.length) {
    const grid = document.createElement('div');
    grid.className = 'card-forms-table';
    card.back.forms.forEach((form, i) => {
      const rowColor = FORM_POS_COLORS[i] || color;
      const row = document.createElement('div');
      row.className = 'form-row';
      row.style.background = rowColor + '22';

      const lbl = document.createElement('div');
      lbl.className = 'form-cell-label';
      lbl.textContent = card.back.forms_labels?.[i] || '';
      lbl.style.background = rowColor;
      lbl.style.color = 'white';

      const val = document.createElement('div');
      val.className = 'form-cell-value';
      val.textContent = form;
      val.style.color = rowColor;

      row.appendChild(lbl);
      row.appendChild(val);
      grid.appendChild(row);
    });
    formsEl.appendChild(grid);
  }

  // Note
  const noteEl = document.getElementById('backNote');
  if (card.back.note) {
    noteEl.textContent = card.back.note;
    noteEl.style.display = 'block';
    noteEl.style.borderLeftColor = color;
    noteEl.style.background  = color + '18';
    noteEl.style.color = 'var(--text2)';
  } else {
    noteEl.style.display = 'none';
  }

  // Speak buttons
  const speakWordBtn = document.getElementById('speakWord');
  speakWordBtn.onclick = (e) => { e.stopPropagation(); speak(card.back.primary, speakWordBtn); };

  // Example
  const exEl = document.getElementById('backExample');
  const speakExBtn = document.getElementById('speakExample');
  if (card.back.example) {
    exEl.innerHTML = `<b>${card.back.example}</b><br><span style="font-style:normal;font-size:0.82rem;color:var(--subtext)">${card.back.example_translation || ''}</span>`;
    speakExBtn.style.display = 'inline-flex';
    speakExBtn.onclick = (e) => { e.stopPropagation(); speak(card.back.example, speakExBtn); };
  } else if (card.back.rule_english) {
    exEl.textContent = card.back.rule_english;
    speakExBtn.style.display = 'none';
  } else {
    exEl.textContent = '';
    speakExBtn.style.display = 'none';
  }

  // Deco background label
  const decoEl = document.getElementById('cardDeco');
  decoEl.textContent = DECO_LABELS[card.type] || '';
  decoEl.style.color = color;

  document.getElementById('backSource').textContent = card.source || '';
  updateHeader();
}

function handleCardClick() {
  if (!flipped) {
    flipped = true;
    document.getElementById('cardWrap').classList.add('flipped');
    document.getElementById('cardRating').classList.add('visible');
  } else {
    flipped = false;
    document.getElementById('cardWrap').classList.remove('flipped');
    document.getElementById('cardRating').classList.remove('visible');
  }
}

function rateCard(r) {
  const card = deck[pos];
  ratings[card.id] = r;
  saveRatings();
  pos++;
  showCard();
}

function startNewRound() {
  buildDeck();
  showCard();
}

// ── FILTER EVENT HANDLERS ───────────────────────────────────────────────────
document.getElementById('groupTabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('#groupTabs .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeGroup = btn.dataset.group;
  buildDeck();
  showCard();
  updateFilterCounts();
});

document.getElementById('typeTabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-tab');
  if (!btn) return;
  document.querySelectorAll('#typeTabs .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeType = btn.dataset.type;
  buildDeck();
  showCard();
  updateFilterCounts();
});

function updateFilterCounts() {
  const pool = getPool();
  document.querySelector('#groupTabs .filter-tab[data-group="all"]').textContent =
    `All (${CARDS_RAW.length})`;
  const chapCount = CARDS_RAW.filter(c => c.group === 'chapter').length;
  const otherCount = CARDS_RAW.filter(c => c.group === 'other').length;
  document.querySelector('#groupTabs .filter-tab[data-group="chapter"]').textContent =
    `Chapter vocab (${chapCount})`;
  document.querySelector('#groupTabs .filter-tab[data-group="other"]').textContent =
    `Other words (${otherCount})`;

  document.querySelectorAll('#typeTabs .filter-tab[data-type]').forEach(btn => {
    const t = btn.dataset.type;
    if (t === 'all') {
      btn.textContent = `All types`;
      return;
    }
    const count = CARDS_RAW.filter(c => c.type === t).length;
    btn.textContent = `${TYPE_LABELS[t]} (${count})`;
  });
}

// ── VIEW SWITCHING ──────────────────────────────────────────────────────────
let currentView = 'flashcards';

function switchView(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById('view-' + viewName);
  if (target) target.classList.add('active');
  currentView = viewName;
  localStorage.setItem('svenska_last_view', viewName);

  // Update bottom nav active state
  document.querySelectorAll('.bottom-nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === viewName);
  });

  // Update header title based on view
  const titles = {
    dashboard: 'Svenska',
    flashcards: CHAPTERS[currentChapter].title,
    'verb-drill': 'Verb Drill'
  };
  document.getElementById('headerChapter').textContent = titles[viewName] || '';
}

// ── CHAPTER SWITCHING ────────────────────────────────────────────────────────
function renderChapterSelector() {
  const container = document.getElementById('chapterSelector');
  container.innerHTML = '';
  Object.values(CHAPTERS).forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (ch.num === currentChapter ? ' active' : '');
    btn.dataset.chapter = ch.num;
    btn.innerHTML = `
      <div class="chapter-btn-num">${ch.num}</div>
      <div class="chapter-btn-label">${ch.subtitle}</div>
      <div class="chapter-btn-count">${ch.cards.length} cards</div>
    `;
    btn.addEventListener('click', () => switchChapter(ch.num));
    container.appendChild(btn);
  });
}

function switchChapter(num) {
  if (num === currentChapter) return;
  currentChapter = num;
  CARDS_RAW = CHAPTERS[num].cards;
  document.getElementById('headerChapter').textContent = CHAPTERS[num].title;

  // Update chapter selector active state
  document.querySelectorAll('.chapter-btn').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.chapter) === num);
  });

  // Reset filters
  activeGroup = 'all';
  activeType = 'all';
  document.querySelectorAll('#groupTabs .filter-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('#groupTabs .filter-tab[data-group="all"]').classList.add('active');
  document.querySelectorAll('#typeTabs .filter-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('#typeTabs .filter-tab[data-type="all"]').classList.add('active');

  // Reload
  loadRatings();
  updateFilterCounts();
  buildDeck();
  showCard();

  // Save last chapter preference
  localStorage.setItem('svenska_last_chapter', num);
}

// ── INIT ────────────────────────────────────────────────────────────────────
// Restore last used chapter
const savedChapter = Number(localStorage.getItem('svenska_last_chapter'));
if (savedChapter && CHAPTERS[savedChapter]) {
  currentChapter = savedChapter;
  CARDS_RAW = CHAPTERS[savedChapter].cards;
  document.getElementById('headerChapter').textContent = CHAPTERS[savedChapter].title;
}

renderChapterSelector();
loadRatings();
updateFilterCounts();
buildDeck();
showCard();
</script>
</body>
